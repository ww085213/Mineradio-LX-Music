<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mineradio Desktop Surface</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050608;color:#fff;font-family:"Microsoft YaHei","Noto Sans SC",system-ui,sans-serif;user-select:none}
    :root{--accent:#ffbf66;--accent2:#8fe8ff;--glow:#fff4cb;--safe:clamp(18px,2vw,32px);--hud-bottom:clamp(22px,4vh,54px)}
    canvas{position:fixed;inset:0;width:100%;height:100%;display:block}
    #bgCover{position:fixed;inset:-2%;background-size:cover;background-position:center;filter:saturate(1.05) brightness(.58);opacity:.34;transform:scale(1.02);transition:background-image .25s,opacity .25s}
    #shade{position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 42%,rgba(255,255,255,.13),transparent 26%),linear-gradient(90deg,rgba(0,0,0,.48),rgba(0,0,0,.06) 44%,rgba(0,0,0,.48)),linear-gradient(180deg,rgba(0,0,0,.18),rgba(0,0,0,.50));mix-blend-mode:normal}
    #rain{position:fixed;inset:0;pointer-events:none;opacity:.16;background:repeating-linear-gradient(104deg,rgba(255,255,255,.13) 0 1px,transparent 1px 18px);mask-image:linear-gradient(180deg,transparent,black 8%,black 92%,transparent)}
    body.particle-veil #shade{background:radial-gradient(circle at 48% 38%,rgba(255,255,255,.20),transparent 28%),radial-gradient(circle at 74% 44%,rgba(155,235,255,.14),transparent 30%),linear-gradient(90deg,rgba(0,0,0,.58),rgba(0,0,0,.10) 45%,rgba(0,0,0,.50)),linear-gradient(180deg,rgba(0,0,0,.10),rgba(0,0,0,.56))}
    body.particle-veil #rain{inset:-8%;opacity:.34;background-image:repeating-linear-gradient(105deg,rgba(255,255,255,.20) 0 1px,transparent 1px 18px),repeating-linear-gradient(105deg,rgba(210,244,255,.14) 0 1px,transparent 1px 34px);background-size:120px 220px,170px 310px;background-position:0 0,42px 18px;filter:blur(.25px);mask-image:linear-gradient(180deg,transparent,black 6%,black 94%,transparent);animation:rain 1.9s linear infinite}
    body.aurora-drift #shade{background:radial-gradient(ellipse at 42% 34%,rgba(118,255,218,.22),transparent 30%),radial-gradient(ellipse at 70% 58%,rgba(255,152,215,.16),transparent 32%),linear-gradient(90deg,rgba(0,0,0,.56),rgba(0,0,0,.10) 42%,rgba(0,0,0,.50)),linear-gradient(180deg,rgba(2,8,12,.10),rgba(0,0,0,.58))}
    body.aurora-drift #rain{inset:-6%;opacity:.10;background:repeating-linear-gradient(100deg,rgba(180,245,255,.16) 0 1px,transparent 1px 42px);filter:blur(.6px);animation:rain 3.8s linear infinite}
    @keyframes rain{from{transform:translate3d(-32px,-72px,0)}to{transform:translate3d(34px,76px,0)}}

    #topBar{position:fixed;z-index:10;top:10px;right:10px;display:flex;align-items:center;gap:8px}
    .chromeBtn,.pillBtn,.orbBtn{border:1px solid rgba(255,255,255,.12);background:rgba(10,12,18,.42);color:rgba(255,255,255,.82);backdrop-filter:blur(18px) saturate(1.18);-webkit-backdrop-filter:blur(18px) saturate(1.18);box-shadow:0 14px 42px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,255,255,.10);cursor:pointer;transition:transform .18s,background .18s,border-color .18s,color .18s}
    .chromeBtn:hover,.pillBtn:hover,.orbBtn:hover{transform:translateY(-1px);background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.22);color:#fff}
    .pillBtn{height:46px;min-width:118px;border-radius:999px;padding:0 22px;display:flex;align-items:center;justify-content:center;gap:9px;font-weight:900;letter-spacing:.02em}
    .pillBtn::before{content:"";width:8px;height:8px;border-radius:50%;background:#ff5570;box-shadow:0 0 18px #ff5570}
    .chromeBtn{width:58px;height:46px;border-radius:17px;font-size:22px;font-weight:900;display:flex;align-items:center;justify-content:center}
    #sideRail{position:fixed;z-index:9;right:10px;top:86px;bottom:86px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;pointer-events:none}
    .orbStack{display:flex;flex-direction:column;gap:12px;pointer-events:auto}
    .orbBtn{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:25px}

    #stage{position:fixed;z-index:3;left:50%;top:46%;width:min(86vw,1500px);transform:translate(-50%,-50%);pointer-events:none;text-align:center}
    #paper{position:absolute;left:50%;top:44%;width:min(62vw,980px);height:min(70vh,760px);transform:translate(-50%,-50%) rotate(-1deg);opacity:.58;filter:drop-shadow(0 18px 42px rgba(0,0,0,.30));pointer-events:none}
    #paper::before{content:"";position:absolute;inset:0;border-radius:32px;background:radial-gradient(circle at 48% 44%,rgba(255,255,255,.94),rgba(255,255,255,.68) 35%,rgba(255,255,255,.20) 74%,transparent 100%);box-shadow:inset 0 0 80px rgba(255,255,255,.6),0 0 80px rgba(255,255,255,.18)}
    #paper::after{content:"";position:absolute;inset:2%;border-radius:30px;background-image:radial-gradient(circle,rgba(255,255,255,.78) 0 1px,transparent 1.15px),radial-gradient(circle,var(--accent2) 0 1px,transparent 1.12px),radial-gradient(circle,var(--accent) 0 1.1px,transparent 1.2px);background-size:12px 12px,16px 16px,22px 22px;background-position:0 0,5px 5px,8px 2px;mix-blend-mode:screen;opacity:.54}
    body.particle-veil #paper{left:48%;top:43%;width:min(70vw,1180px);height:min(75vh,820px);transform:translate(-50%,-50%) rotate(-2deg);opacity:.42;filter:drop-shadow(0 22px 58px rgba(0,0,0,.34))}
    body.particle-veil #paper::before{border-radius:50%;background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.70),rgba(221,251,255,.36) 32%,rgba(137,232,255,.16) 62%,transparent 82%);box-shadow:inset 0 0 120px rgba(255,255,255,.58),0 0 110px rgba(180,248,255,.18)}
    body.particle-veil #paper::after{inset:-3%;border-radius:50%;background-image:radial-gradient(circle,rgba(255,255,255,.86) 0 1.15px,transparent 1.32px),radial-gradient(circle,rgba(143,232,255,.82) 0 1px,transparent 1.2px),radial-gradient(circle,rgba(12,18,22,.55) 0 .9px,transparent 1.12px);background-size:10px 10px,15px 15px,8px 8px;background-position:0 0,5px 4px,2px 6px;opacity:.66}
    body.aurora-drift #paper{left:50%;top:39%;width:min(86vw,1380px);height:min(66vh,720px);transform:translate(-50%,-50%) rotate(.5deg);opacity:.22;filter:blur(.2px) drop-shadow(0 22px 70px rgba(61,255,205,.18))}
    body.aurora-drift #paper::before{border-radius:44% 56% 48% 52%;background:linear-gradient(105deg,transparent 0 12%,rgba(122,255,214,.34) 22%,rgba(157,214,255,.16) 38%,rgba(255,150,218,.18) 58%,transparent 82%);box-shadow:0 0 120px rgba(104,255,218,.20)}
    body.aurora-drift #paper::after{inset:0;border-radius:46% 54% 52% 48%;background-image:linear-gradient(100deg,transparent,rgba(255,255,255,.36),transparent),linear-gradient(78deg,transparent,rgba(91,238,255,.28),transparent);background-size:28% 100%,34% 100%;background-position:20% 0,62% 0;opacity:.55;mix-blend-mode:screen}
    @keyframes paperBreathe{0%,100%{filter:blur(.1px);transform:scale(1)}50%{filter:blur(.8px);transform:scale(1.012)}}
    #coverGhost{position:absolute;left:50%;top:46%;width:min(46vw,650px);aspect-ratio:1/1;transform:translate(-50%,-50%);background-size:cover;background-position:center;border-radius:28px;opacity:.36;filter:saturate(1.3) contrast(1.08);mix-blend-mode:multiply}
    body.particle-veil #coverGhost{width:min(48vw,700px);border-radius:50%;opacity:.28;filter:saturate(1.18) contrast(1.05) grayscale(.12)}
    body.aurora-drift #coverGhost{width:min(42vw,610px);border-radius:38px;opacity:.18;filter:saturate(1.35) contrast(1.04) blur(.2px);mix-blend-mode:soft-light}
    #lyricStack{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:clamp(14px,2vh,28px);padding:0 3vw;text-shadow:0 14px 36px rgba(0,0,0,.58),0 0 22px rgba(255,255,255,.20)}
    .lyricLine{max-width:100%;font-weight:950;letter-spacing:0;line-height:1.04;white-space:normal;text-wrap:balance;overflow-wrap:anywhere;transition:opacity .24s,transform .24s,color .24s}
    .lyricLine.current{font-size:clamp(44px,5.1vw,92px);color:color-mix(in srgb,var(--accent) 72%,#fff 28%);text-shadow:0 12px 34px rgba(0,0,0,.52),0 0 24px color-mix(in srgb,var(--accent) 42%,transparent)}
    .lyricLine.translation{font-size:clamp(34px,4vw,72px);color:rgba(255,229,195,.82);opacity:.84}
    .lyricLine.future,.lyricLine.past{font-size:clamp(22px,2.4vw,44px);color:rgba(255,255,255,.42);opacity:.48}
    body.particle-veil .lyricLine.current{font-size:clamp(48px,5.6vw,104px);color:rgba(235,247,255,.92);text-shadow:0 14px 36px rgba(0,0,0,.56),0 0 26px rgba(191,243,255,.46),0 0 44px color-mix(in srgb,var(--accent2) 28%,transparent)}
    body.particle-veil .lyricLine.translation{font-size:clamp(36px,4.2vw,76px);color:rgba(245,250,255,.86);opacity:.90}
    body.particle-veil .lyricLine.future,body.particle-veil .lyricLine.past{font-size:clamp(24px,2.8vw,50px);color:rgba(217,235,248,.45);opacity:.50}
    body.aurora-drift .lyricLine.current{font-size:clamp(46px,5.2vw,96px);color:rgba(232,255,248,.94);text-shadow:0 14px 40px rgba(0,0,0,.62),0 0 26px rgba(116,255,216,.34),0 0 56px rgba(255,145,224,.18)}
    body.aurora-drift .lyricLine.translation{font-size:clamp(34px,4vw,72px);color:rgba(219,246,255,.78);opacity:.84}
    body:not(.playing) #lyricStack{opacity:.64}
    #songChip{position:fixed;z-index:4;left:var(--safe);bottom:calc(var(--hud-bottom) + 86px);max-width:min(440px,40vw);height:64px;padding:8px 18px 8px 8px;border-radius:22px;border:1px solid rgba(255,255,255,.12);background:rgba(8,10,16,.42);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);display:flex;align-items:center;gap:12px;box-shadow:0 18px 54px rgba(0,0,0,.28)}
    #chipCover{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.05));background-size:cover;background-position:center;flex:0 0 auto}
    #chipMeta{min-width:0}
    #chipTitle{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:15px;font-weight:900}
    #chipArtist{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px;font-size:12px;color:rgba(255,255,255,.56)}

    #hud{position:fixed;z-index:8;left:50%;bottom:var(--hud-bottom);width:min(1100px,calc(100vw - 180px));min-height:74px;transform:translateX(-50%);border-radius:28px;border:1px solid rgba(255,255,255,.13);background:linear-gradient(112deg,rgba(7,9,15,.56),rgba(25,30,40,.42));box-shadow:0 18px 52px rgba(0,0,0,.26),inset 0 1px 0 rgba(255,255,255,.14);backdrop-filter:blur(14px) saturate(1.12);-webkit-backdrop-filter:blur(14px) saturate(1.12);display:grid;grid-template-columns:minmax(210px,1fr) auto minmax(220px,1fr);gap:16px;align-items:center;padding:11px 18px 15px}
    #bar{position:absolute;left:22px;right:22px;bottom:8px;height:4px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden;cursor:pointer}
    #fill{width:0;height:100%;border-radius:inherit;background:linear-gradient(90deg,rgba(255,255,255,.56),var(--accent));box-shadow:0 0 18px var(--accent);transition:width .16s linear}
    .hudMeta{min-width:0;display:flex;align-items:center;gap:12px}
    #cover{width:52px;height:52px;border-radius:17px;background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.06));background-size:cover;background-position:center;box-shadow:0 12px 30px rgba(0,0,0,.32)}
    #cover.empty::after{content:"♪";display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:26px;font-weight:900;color:rgba(255,255,255,.7)}
    #title{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:15px;font-weight:900}
    #artist{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:4px;font-size:12px;color:rgba(255,255,255,.55)}
    #controls{display:flex;align-items:center;justify-content:center;gap:9px}
    .wbtn{height:38px;min-width:38px;border:0;border-radius:13px;background:transparent;color:rgba(255,255,255,.76);font-size:14px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:background .16s,transform .16s,color .16s;text-align:center}
    .wbtn:hover{background:rgba(255,255,255,.11);color:#fff;transform:translateY(-1px)}
    #wPlay{width:48px;height:48px;border-radius:17px;background:rgba(255,255,255,.12);font-size:18px}
    #wMode,#wQuality,#wSpeed{width:auto;padding:0 10px;font-size:11px}
    #rightTools{display:flex;align-items:center;justify-content:flex-end;gap:8px;min-width:0}
    #bars{display:flex;align-items:flex-end;gap:4px;height:26px;opacity:.72}
    #bars i{width:3px;border-radius:999px;background:linear-gradient(180deg,#fff,var(--accent));height:10px;transform-origin:bottom;animation:vu .84s ease-in-out infinite;animation-play-state:paused}
    #bars i:nth-child(2){height:17px;animation-delay:.1s}#bars i:nth-child(3){height:12px;animation-delay:.2s}#bars i:nth-child(4){height:22px;animation-delay:.04s}
    body.playing #bars i{animation-play-state:running}
    @keyframes vu{0%,100%{transform:scaleY(.45);opacity:.46}50%{transform:scaleY(1);opacity:1}}
    #wVolumeWrap{position:relative;display:flex;align-items:center}
    #wVolumePanel{position:absolute;right:0;bottom:46px;width:176px;padding:12px;border-radius:18px;background:rgba(8,10,16,.86);border:1px solid rgba(255,255,255,.13);box-shadow:0 18px 60px rgba(0,0,0,.40);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .18s,transform .18s}
    #wVolumeWrap.open #wVolumePanel{opacity:1;pointer-events:auto;transform:translateY(0)}
    #wVolumeSlider{width:100%;accent-color:var(--accent)}
    #wVolText{font-size:12px;color:rgba(255,255,255,.62);margin-top:6px;text-align:center;font-weight:800}
    @media (max-width:980px){#hud{width:calc(100vw - 24px);grid-template-columns:1fr;gap:8px;padding-bottom:18px}.hudMeta,#rightTools{justify-content:center}.lyricLine.current{font-size:clamp(34px,8vw,70px)}.lyricLine.translation{font-size:clamp(26px,6vw,54px)}#songChip{display:none}.chromeBtn{width:48px}.pillBtn{min-width:92px;padding:0 14px}.orbBtn{width:54px;height:54px}}
    /* Controls live in a separate transparent desktop child window so the
       WorkerW render surface never blocks Explorer icons. */
    #topBar,#sideRail,#songChip,#hud{display:none!important}
  </style>
</head>
<body>
  <div id="bgCover"></div>
  <canvas id="wall"></canvas>
  <div id="shade"></div>
  <div id="rain"></div>

  <div id="topBar">
    <button class="pillBtn" data-cmd="show-main" title="打开 Mineradio DIY 面板">DIY</button>
    <button class="chromeBtn" data-cmd="show-main" title="显示主窗口">−</button>
    <button class="chromeBtn" data-cmd="fullscreen" title="切换全屏">□</button>
    <button class="chromeBtn" data-cmd="wallpaper-off" title="关闭桌面融合">×</button>
  </div>

  <div id="sideRail">
    <div class="orbStack">
      <button class="orbBtn" data-cmd="show-main" title="打开主界面">⌂</button>
    </div>
    <div class="orbStack">
      <button class="orbBtn" data-cmd="lyrics" title="歌词面板">词</button>
      <button class="orbBtn" data-cmd="queue" title="播放列表">☷</button>
    </div>
  </div>

  <section id="stage" aria-hidden="true">
    <div id="paper"></div>
    <div id="coverGhost"></div>
    <div id="lyricStack"></div>
  </section>

  <div id="songChip">
    <div id="chipCover"></div>
    <div id="chipMeta">
      <div id="chipTitle">Mineradio</div>
      <div id="chipArtist">桌面融合播放</div>
    </div>
  </div>

  <div id="hud">
    <div class="hudMeta">
      <div id="cover" class="empty"></div>
      <div style="min-width:0">
        <div id="title">Mineradio</div>
        <div id="artist">桌面融合播放</div>
      </div>
    </div>
    <div id="controls">
      <button class="wbtn" data-cmd="previous" title="上一首">‹</button>
      <button class="wbtn" id="wPlay" data-cmd="toggle-play" title="播放 / 暂停">▶</button>
      <button class="wbtn" data-cmd="next" title="下一首">›</button>
      <button class="wbtn" id="wMode" data-cmd="mode" title="播放模式">循环</button>
      <button class="wbtn" data-cmd="collect" title="加入歌单">＋</button>
      <button class="wbtn" data-cmd="immersive" title="沉浸">沉浸</button>
    </div>
    <div id="rightTools">
      <div id="bars"><i></i><i></i><i></i><i></i></div>
      <button class="wbtn" id="wQuality" data-cmd="show-main" title="音质">音质</button>
      <button class="wbtn" id="wSpeed" data-cmd="show-main" title="倍速 / 音调">1.00x</button>
      <div id="wVolumeWrap">
        <button class="wbtn" id="wVolumeBtn" title="音量">音量</button>
        <div id="wVolumePanel">
          <input id="wVolumeSlider" type="range" min="0" max="1" step="0.01" value="1">
          <div id="wVolText">100%</div>
        </div>
      </div>
    </div>
    <div id="bar" title="点击定位播放进度"><div id="fill"></div></div>
  </div>

  <script>
    'use strict';
    var canvas = document.getElementById('wall');
    var ctx = canvas.getContext('2d', { alpha:false });
    var W = 1, H = 1, dpr = 1;
    var state = {
      enabled:false,title:'Mineradio',artist:'桌面融合播放',cover:'',lyric:'播放歌曲后会显示歌词',lyricItems:[],lyricTextFull:'',
      playing:false,preset:0,opacity:1,time:0,duration:0,rate:1,volume:1,playMode:'loop',quality:'音质',speedLabel:'1.00x',
      colors:{primary:'#d6f8ff',secondary:'#8fe8ff',highlight:'#ffbf66',glow:'#fff4cb'}
    };
    var coverImg = null, coverSrc = '', stateAt = performance.now(), particles = [], lastDrawAt = 0;
    var bgCover=document.getElementById('bgCover'), coverGhost=document.getElementById('coverGhost'), lyricStack=document.getElementById('lyricStack');
    var titleEl=document.getElementById('title'),artistEl=document.getElementById('artist'),coverEl=document.getElementById('cover'),fillEl=document.getElementById('fill');
    var chipCover=document.getElementById('chipCover'),chipTitle=document.getElementById('chipTitle'),chipArtist=document.getElementById('chipArtist');
    var playBtn=document.getElementById('wPlay'), modeBtn=document.getElementById('wMode'), qualityBtn=document.getElementById('wQuality'), speedBtn=document.getElementById('wSpeed');
    var volumeWrap=document.getElementById('wVolumeWrap'), volumeBtn=document.getElementById('wVolumeBtn'), volumeSlider=document.getElementById('wVolumeSlider'), volText=document.getElementById('wVolText'), progressBar=document.getElementById('bar');
    function esc(text){return String(text==null?'':text).replace(/[&<>"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]})}
    function hexToRgb(hex, fallback){hex=String(hex||fallback||'#ffbf66').trim();if(/^#[0-9a-f]{3}$/i.test(hex))hex='#'+hex[1]+hex[1]+hex[2]+hex[2]+hex[3]+hex[3];if(!/^#[0-9a-f]{6}$/i.test(hex))hex=fallback||'#ffbf66';return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)}}
    function rgba(hex,a){var c=hexToRgb(hex);return 'rgba('+c.r+','+c.g+','+c.b+','+a+')'}
    function rand(seed){return Math.abs(Math.sin(seed*3187.917)*43758.5453)%1}
    function isParticleVeilPreset(){return Number(state.preset)===7}
    function isAuroraPreset(){return Number(state.preset)===8}
    function resize(){dpr=1;W=Math.max(1,Math.floor(innerWidth*dpr));H=Math.max(1,Math.floor(innerHeight*dpr));canvas.width=W;canvas.height=H;canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';ctx.setTransform(dpr,0,0,dpr,0,0);ensureParticles()}
    function ensureParticles(){
      var veil=isParticleVeilPreset(), aurora=isAuroraPreset();
      var target=veil?Math.min(2600,Math.max(980,Math.round(innerWidth*innerHeight/1850))):(aurora?Math.min(900,Math.max(420,Math.round(innerWidth*innerHeight/5200))):Math.min(520,Math.max(220,Math.round(innerWidth*innerHeight/9000))));
      while(particles.length<target){
        var i=particles.length+1, mode=rand(i*13.1);
        particles.push({
          seed:i*9.37,x:rand(i),y:rand(i*2.7),z:rand(i*8.1),lane:rand(i*5.9),
          mode:mode<.42?'halo':(mode<.74?'ribbon':'mist'),
          size:.45+rand(i*4.2)*2.6,twinkle:rand(i*7.7),shade:rand(i*11.3)
        })
      }
      if(particles.length>target+180)particles.length=target
    }
    function setCover(src){src=String(src||'');if(src===coverSrc)return;coverSrc=src;coverImg=null;var bg=src?'url("'+src.replace(/"/g,'%22')+'")':'';coverEl.classList.toggle('empty',!src);coverEl.style.backgroundImage=bg;chipCover.style.backgroundImage=bg;coverGhost.style.backgroundImage=bg;bgCover.style.backgroundImage=bg;if(!src)return;var img=new Image();img.crossOrigin='anonymous';img.onload=function(){if(coverSrc===src)coverImg=img};img.onerror=function(){if(coverSrc===src)coverImg=null};img.src=src}
